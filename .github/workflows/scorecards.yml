name: Scorecard supply-chain security

on:
    branch_protection_rule:
    schedule:
        - cron: "30 1 * * 6"  # Weekly on Saturday
    push:
        branches: ["main"]

permissions: read-all

jobs:
    analysis:
        name: Scorecard analysis
        runs-on: ubuntu-latest
        # Code-Review check is structurally 0 for a solo project (no second approver).
        # The SARIF results still upload to GitHub Security; this stops that from
        # failing the whole workflow and blocking main CI.
        continue-on-error: true
        permissions:
            security-events: write
            id-token: write
            contents: read
            actions: read

        steps:
            - name: Checkout code
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
              with:
                  persist-credentials: false

            - name: Run Scorecard analysis
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
              with:
                  results_file: results.sarif
                  results_format: sarif
                  publish_results: true

            - name: Upload SARIF artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
              with:
                  name: SARIF file
                  path: results.sarif
                  retention-days: 5

            - name: Upload to GitHub code-scanning
              uses: github/codeql-action/upload-sarif@f58f0d11ebf5dedd870fab2f999275f7602cfa46  # codeql-bundle-v2.26.0
              with:
                  sarif_file: results.sarif
