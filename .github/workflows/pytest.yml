name: PyTest

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

concurrency:
    group: ${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            max-parallel: 3
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install uv and set the python version
              uses: astral-sh/setup-uv@v7
              with:
                  python-version: ${{ matrix.python-version }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Get current date
              id: date
              run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

            - name: Cache downloaded source data
              uses: actions/cache@v4
              with:
                  path: ~/.cache/bolster
                  # Key rotates daily so a successful download survives between
                  # runs on the same day (shared across the whole matrix via
                  # restore-keys) without caching stale/broken downloads forever.
                  key: bolster-downloads-${{ runner.os }}-${{ steps.date.outputs.date }}
                  restore-keys: |
                      bolster-downloads-${{ runner.os }}-

            - name: Install the project
              run: uv sync --all-extras --dev

            - name: Run tests
              # For example, using `pytest`
              run: uv run pytest tests --cov-branch --cov-report=xml --cov=bolster --cov --junitxml=junit.xml -o junit_family=legacy

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

            - name: Upload test results to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@v7
              with:
                  report_type: test_results
                  token: ${{ secrets.CODECOV_TOKEN }}
