name: PyTest

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

# Only one PyTest run (across all branches/PRs) hits the live NISRA/
# NIAssembly/etc endpoints at a time. Removed in #1946 on the theory that
# the download cache made cross-branch throttling unnecessary, but on
# 2026-06-28 removing it let 7 branches' full matrices (~28 jobs) fire
# within 28 seconds of each other, and every one of them timed out against
# data.niassembly.gov.uk — a server that degrades under concurrent load
# rather than rate-limiting (no HTTP 429s observed) looks exactly like
# this. Runs queue rather than cancel, so a slow run delays but doesn't
# drop later ones.
concurrency:
    group: pytest-all
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            max-parallel: 4
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13"]

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install uv and set the python version
              uses: astral-sh/setup-uv@v7
              with:
                  python-version: ${{ matrix.python-version }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Get current date
              id: date
              run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

            - name: Cache downloaded source data
              uses: actions/cache@v4
              with:
                  path: ~/.cache/bolster
                  # Key rotates daily so a successful download survives between
                  # runs on the same day (shared across the whole matrix via
                  # restore-keys) without caching stale/broken downloads forever.
                  key: bolster-downloads-${{ runner.os }}-${{ steps.date.outputs.date }}
                  restore-keys: |
                      bolster-downloads-${{ runner.os }}-

            - name: Install the project
              run: uv sync --all-extras --dev

            - name: Run tests
              # For example, using `pytest`
              run: uv run pytest tests --cov-branch --cov-report=xml --cov=bolster --cov --junitxml=junit.xml -o junit_family=legacy

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

            - name: Upload test results to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@v7
              with:
                  report_type: test_results
                  token: ${{ secrets.CODECOV_TOKEN }}
