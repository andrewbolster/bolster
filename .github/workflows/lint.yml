name: Lint With Ruff

permissions: read-all

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
          - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6  # v3
            with:
              src: "./src"  # Only check src directory to match pre-commit scope

    security:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
          - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
            with:
              python-version: "3.11"
          - name: Install bandit
            run: uv tool install bandit
          - name: Run bandit security scan
            run: bandit -r src/bolster -ll -x src/bolster/cli.py
